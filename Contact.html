<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact – Tammy's Spotless Cleaning</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">Tammy's Spotless Cleaning</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="instant-quote.html">Instant Quote</a>
      <a href="book.html">Book</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main class="page">
    <h1>Contact</h1>

    <section class="card">
      <h2>Get in Touch</h2>
      <p>Email: <a href="mailto:spotlesscleaninglac@gmail.com">spotlesscleaninglac@gmail.com</a></p>
      <p>Phone: <a href="tel:XXX-XXX-XXXX">XXX-XXX-XXXX</a></p>
      <p>Service Areas: Lacombe, Slidell, Mandeville, Covington</p>
    </section>

    <section class="card">
      <h2>Quick Message</h2>
      <form id="contact-form">
        <label>Name<input type="text" name="name" required /></label>
        <label>Email<input type="email" name="email" required /></label>
        <label>Message<textarea name="message" rows="4" required></textarea></label>
        <button type="submit" class="btn primary">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© Tammy's Spotless Cleaning</p>
  </footer>
</body>
</html>
